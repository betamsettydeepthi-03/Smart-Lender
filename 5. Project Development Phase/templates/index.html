<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender - Loan Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🏦 Smart Lender</h1>
    <h3>Loan Approval Prediction System</h3>

    <form action="/predict" method="POST">

        <label>Gender</label>
        <select name="gender" required>
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Married</label>
        <select name="married" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Dependents</label>
        <select name="dependents" required>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3+</option>
        </select>

        <label>Education</label>
        <select name="education" required>
            <option value="1">Graduate</option>
            <option value="0">Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select name="self_employed" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" name="applicant_income" required>

        <label>Coapplicant Income</label>
        <input type="number" name="coapplicant_income" required>

        <label>Loan Amount</label>
        <input type="number" name="loan_amount" required>

        <label>Loan Amount Term (Months)</label>
        <input type="number" name="loan_amount_term" value="360" required>

        <label>Credit History</label>
        <select name="credit_history" required>
            <option value="1">Good (1)</option>
            <option value="0">Bad (0)</option>
        </select>

        <label>Property Area</label>
        <select name="property_area" required>
            <option value="2">Urban</option>
            <option value="1">Semiurban</option>
            <option value="0">Rural</option>
        </select>

        <button type="submit">Predict Loan</button>

    </form>

</div>

</body>
</html>
